name: Quality Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Check repository structure
      run: |
        echo "🔍 Checking repository structure..."

        # Check required directories
        for dir in control ops capabilities; do
          if [ ! -d "$dir" ]; then
            echo "❌ Missing required directory: $dir"
            exit 1
          fi
        done

        # Check required files
        for file in README.md QUICKSTART.md NOW.md capabilities/INDEX.md; do
          if [ ! -f "$file" ]; then
            echo "❌ Missing required file: $file"
            exit 1
          fi
        done

        echo "✅ Structure check passed"

    - name: Check capability assets quality
      run: |
        echo "🔍 Checking capability assets quality..."
        chmod +x ops/scripts/check-capabilities.sh
        bash ops/scripts/check-capabilities.sh

        # Fail if quality issues found
        if grep -q "⚠️ \*\*健康状态\*\*：需要改进" ops/reports/capability-quality-*.md; then
          echo "❌ Capability quality issues found"
          exit 1
        fi

        echo "✅ Capability quality check passed"

    - name: Verify capability index sync
      run: |
        echo "🔍 Verifying capability index sync..."
        chmod +x ops/scripts/sync-capability-index.sh
        bash ops/scripts/sync-capability-index.sh --dry-run

        # If sync needed, fail CI
        if ! bash ops/scripts/sync-capability-index.sh --dry-run | grep -q "统计数据已同步"; then
          echo "❌ capabilities/INDEX.md is out of sync"
          echo "Run: bash ops/scripts/sync-capability-index.sh"
          exit 1
        fi

        echo "✅ Index sync verified"

    - name: Check for TODO/FIXME
      run: |
        echo "🔍 Checking for unresolved TODOs..."

        # Find TODOs in code (not in docs)
        if grep -r "TODO\|FIXME" ops/scripts/*.sh 2>/dev/null; then
          echo "⚠️ Found TODOs in scripts (informational only)"
        else
          echo "✅ No critical TODOs found"
        fi

    - name: Summary
      if: always()
      run: |
        echo "📊 Quality Check Summary"
        echo "========================"
        echo "- Structure: ✅"
        echo "- Capability Quality: ✅"
        echo "- Index Sync: ✅"
        echo "- TODOs: ✅"
        echo ""
        echo "All checks passed! 🎉"
